<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback – Sıvı Tespiti MVP</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 700; color: #3a6b1f; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    #start-btn { background: #3a6b1f; color: white; border: none; border-radius: 12px; padding: 14px 32px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 24px; width: 100%; max-width: 340px; }
    #start-btn:disabled { background: #aaa; }
    #camera-wrap { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 340px; }
    #webcam-container canvas { border-radius: 16px; width: 100% !important; height: auto !important; }
    #result-card { margin-top: 16px; width: 100%; max-width: 340px; border-radius: 16px; padding: 20px; text-align: center; background: white; border: 2px solid #e0e0e0; }
    #result-icon { font-size: 40px; margin-bottom: 8px; }
    #result-label { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    #result-desc { font-size: 13px; color: #666; }
    .card-dolu { background: #fff4f4 !important; border-color: #e53e3e !important; }
    .card-dolu #result-label { color: #c53030; }
    .card-bos { background: #f0fff4 !important; border-color: #38a169 !important; }
    .card-bos #result-label { color: #276749; }
    .card-belirsiz { background: #fffbeb !important; border-color: #d69e2e !important; }
    .card-belirsiz #result-label { color: #b7791f; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .bar-label { font-size: 12px; color: #555; width: 36px; text-align: right; }
    .bar-bg { flex: 1; background: #e0e0e0; border-radius: 99px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.2s; }
    .bar-fill.dolu { background: #e53e3e; }
    .bar-fill.bos { background: #38a169; }
    .bar-pct { font-size: 12px; color: #555; width: 36px; }
    #stop-btn { margin-top: 16px; background: transparent; border: 1.5px solid #ccc; border-radius: 10px; padding: 10px 24px; font-size: 14px; color: #555; cursor: pointer; width: 100%; max-width: 340px; }
    #loading { font-size: 14px; color: #888; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="logo">🌿 Feedback</div>
  <div class="subtitle">Sıvı Kontrol MVP – Demo</div>
  <button id="start-btn" onclick="init()">Kamerayı Başlat</button>
  <div id="loading">Model yükleniyor...</div>
  <div id="camera-wrap">
    <div id="webcam-container"></div>
    <div id="result-card">
      <div id="result-icon">🔍</div>
      <div id="result-label">Taranıyor...</div>
      <div id="result-desc">Atığı kameraya yaklaştırın</div>
      <div class="bar-row"><span class="bar-label">Dolu</span><div class="bar-bg"><div class="bar-fill dolu" id="bar-dolu" style="width:0%"></div></div><span class="bar-pct" id="pct-dolu">0%</span></div>
      <div class="bar-row"><span class="bar-label">Boş</span><div class="bar-bg"><div class="bar-fill bos" id="bar-bos" style="width:0%"></div></div><span class="bar-pct" id="pct-bos">0%</span></div>
    </div>
    <button id="stop-btn" onclick="stopCamera()">Durdur</button>
  </div>
  <script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/3V9rnzUw6/";
    let model, webcam, loop;
    const THRESHOLD = 0.65;
    async function init() {
      const btn = document.getElementById("start-btn");
      const loading = document.getElementById("loading");
      btn.disabled = true;
      btn.textContent = "Yükleniyor...";
      loading.style.display = "block";
      try {
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        const classes = model.getClassLabels();
        console.log("Siniflar:", classes);
        webcam = new tmImage.Webcam(340, 340, false);
        try {
          await webcam.setup({ facingMode: { exact: "environment" } });
        } catch(e) {
          await webcam.setup({ facingMode: "user" });
        }
        await webcam.play();
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        document.getElementById("camera-wrap").style.display = "flex";
        btn.style.display = "none";
        loading.style.display = "none";
        loop = requestAnimationFrame(predict);
      } catch(e) {
        btn.disabled = false;
        btn.textContent = "Kamerayı Başlat";
        loading.style.display = "none";
        alert("Hata: " + e.message);
      }
    }
    async function predict() {
      webcam.update();
      const predictions = await model.predict(webcam.canvas);
      let doluScore = 0, bosScore = 0;
      for (const p of predictions) {
        const name = p.className.trim().toLowerCase().replace("ş","s").replace("ö","o").replace("ü","u").replace("ı","i").replace("ğ","g").replace("ç","c");
        if (name.includes("dolu") || name.includes("full") || name.includes("sivi")) doluScore = p.probability;
        if (name.includes("bos") || name.includes("empty") || name.includes("temiz")) bosScore = p.probability;
      }
      const card = document.getElementById("result-card");
      const icon = document.getElementById("result-icon");
      const label = document.getElementById("result-label");
      const desc = document.getElementById("result-desc");
      card.className = "";
      document.getElementById("bar-dolu").style.width = (doluScore*100).toFixed(0)+"%";
      document.getElementById("bar-bos").style.width = (bosScore*100).toFixed(0)+"%";
      document.getElementById("pct-dolu").textContent = (doluScore*100).toFixed(0)+"%";
      document.getElementById("pct-bos").textContent = (bosScore*100).toFixed(0)+"%";
      if (doluScore >= THRESHOLD) {
        card.classList.add("card-dolu");
        icon.textContent = "⚠️";
        label.textContent = "İçinde Sıvı Var!";
        desc.textContent = "Atmadan önce lütfen boşaltın.";
      } else if (bosScore >= THRESHOLD) {
        card.classList.add("card-bos");
        icon.textContent = "✅";
        label.textContent = "Temiz — Atabilirsin";
        desc.textContent = "Geri dönüşüm kutusuna bırakabilirsin.";
      } else {
        card.classList.add("card-belirsiz");
        icon.textContent = "🔍";
        label.textContent = "Daha Yakın Tut";
        desc.textContent = "Atığı kameraya biraz daha yaklaştırın.";
      }
      loop = requestAnimationFrame(predict);
    }
    function stopCamera() {
      if (loop) cancelAnimationFrame(loop);
      if (webcam) webcam.stop();
      document.getElementById("camera-wrap").style.display = "none";
      const btn = document.getElementById("start-btn");
      btn.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Kamerayı Başlat";
    }
  </script>
</body>
</html>
